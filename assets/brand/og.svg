<?xml version="1.0" encoding="UTF-8"?>
<!-- Neon Fiber Systems — social share card (1200x630) -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Neon Fiber Systems — knock the day fiber goes live">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/><stop offset="0.55" stop-color="#3B82F6"/><stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="halo" cx="78%" cy="20%" r="60%">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.30"/><stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo2" cx="6%" cy="100%" r="55%">
      <stop offset="0" stop-color="#A78BFA" stop-opacity="0.26"/><stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#EAFBFF"/><stop offset="0.35" stop-color="#22D3EE"/><stop offset="1" stop-color="#3B82F6"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="630" fill="#07090F"/>
  <rect width="1200" height="630" fill="url(#halo)"/>
  <rect width="1200" height="630" fill="url(#halo2)"/>

  <!-- pin mark, right side -->
  <g transform="translate(840,150) scale(2.1)" filter="url(#glow)">
    <path d="M64 14 C42 14 26 30 26 52 C26 78 64 112 64 112 C64 112 102 78 102 52 C102 30 86 14 64 14 Z" fill="none" stroke="url(#g)" stroke-width="6" stroke-linejoin="round"/>
    <g fill="none" stroke="url(#g)" stroke-width="3.4" stroke-linecap="round">
      <path d="M64 16 C58 30 58 40 64 50"/><path d="M30 50 C44 50 54 50 64 52" opacity="0.9"/><path d="M98 50 C84 50 74 50 64 52" opacity="0.9"/><path d="M40 28 C50 38 56 44 63 50" opacity="0.8"/><path d="M88 28 C78 38 72 44 65 50" opacity="0.8"/>
    </g>
    <circle cx="64" cy="52" r="13" fill="url(#core)"/><circle cx="64" cy="52" r="5.4" fill="#F2FEFF"/>
  </g>

  <!-- wordmark + tagline, left -->
  <text x="90" y="240" font-family="Orbitron, Arial, sans-serif" font-size="40" font-weight="700" letter-spacing="6" fill="#E8ECF4">NEON <tspan fill="#94A3B8">FIBER</tspan></text>
  <text x="90" y="330" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="700" fill="#E8ECF4">Knock the day</text>
  <text x="90" y="402" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="700" fill="url(#g)">fiber goes live.</text>
  <text x="92" y="470" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="500" fill="#94A3B8">We catch the go-live flip and deliver sell-today doors</text>
  <text x="92" y="506" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="500" fill="#94A3B8">to fiber sales teams. AZ · CO · MI.</text>
  <text x="92" y="566" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#22D3EE">neonfibersystems.com</text>
</svg>
