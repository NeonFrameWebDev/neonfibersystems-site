<?xml version="1.0" encoding="UTF-8"?>
<!-- NEON FIBER — Concept 2: "NF Filament Monogram" icon
     N + F drawn as continuous fiber strands with light running through them.
     Rounded-square badge so it reads as an app icon at small sizes. -->
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="NEON FIBER monogram">
  <defs>
    <linearGradient id="c2-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.55" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="c2-grad2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="c2-badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0E16"/>
      <stop offset="1" stop-color="#07090F"/>
    </linearGradient>
    <filter id="c2-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.0" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- subtle badge: gives the monogram a frame + works on transparent or #07090F -->
  <rect x="6" y="6" width="116" height="116" rx="28" fill="url(#c2-badge)"/>
  <rect x="6.75" y="6.75" width="114.5" height="114.5" rx="27.25"
        fill="none" stroke="url(#c2-grad)" stroke-width="1.5" stroke-opacity="0.55"/>

  <g filter="url(#c2-glow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- "N" as a fiber strand: down-left riser, diagonal, up-right riser -->
    <path d="M34 92 L34 36 L66 86 L66 36"
          stroke="url(#c2-grad)" stroke-width="9"/>
    <!-- "F" as a fiber strand sharing the optical field -->
    <path d="M82 92 L82 36 L104 36 M82 64 L100 64"
          stroke="url(#c2-grad2)" stroke-width="9"/>
  </g>

  <!-- light pulses traveling through the strands -->
  <g fill="#EAFBFF">
    <circle cx="34" cy="50" r="2.4"/>
    <circle cx="66" cy="52" r="2.2"/>
    <circle cx="82" cy="44" r="2.2"/>
  </g>
  <!-- bright strand-entry highlights -->
  <g fill="#22D3EE">
    <circle cx="34" cy="36" r="1.6"/>
    <circle cx="82" cy="36" r="1.6"/>
    <circle cx="104" cy="36" r="1.6"/>
  </g>
</svg>
