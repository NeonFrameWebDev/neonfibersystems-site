<?xml version="1.0" encoding="UTF-8"?>
<!-- NEON FIBER — Concept 1: "Convergence Node" horizontal lockup (~480x120)
     Icon mark + Orbitron wordmark. Transparent bg. Self-contained. -->
<svg xmlns="http://www.w3.org/2000/svg" width="480" height="120" viewBox="0 0 480 120" role="img" aria-label="NEON FIBER">
  <defs>
    <linearGradient id="c1l-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.55" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="c1l-word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E5E7EB"/>
      <stop offset="0.6" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="c1l-core" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#EAFBFF"/>
      <stop offset="0.35" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </radialGradient>
    <radialGradient id="c1l-halo" cx="50%" cy="46%" r="55%">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#3B82F6" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <filter id="c1l-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.0" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="c1l-textglow" x="-15%" y="-40%" width="130%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ICON (scaled from 128 grid into 96px box, vertically centered) -->
  <g transform="translate(8,12) scale(0.75)">
    <circle cx="64" cy="58" r="56" fill="url(#c1l-halo)"/>
    <g filter="url(#c1l-glow)">
      <path d="M64 14 C42 14 26 30 26 52 C26 78 64 112 64 112 C64 112 102 78 102 52 C102 30 86 14 64 14 Z"
            fill="none" stroke="url(#c1l-grad)" stroke-width="6" stroke-linejoin="round"/>
      <g fill="none" stroke="url(#c1l-grad)" stroke-width="3.4" stroke-linecap="round">
        <path d="M64 16 C58 30 58 40 64 50"/>
        <path d="M30 50 C44 50 54 50 64 52" opacity="0.9"/>
        <path d="M98 50 C84 50 74 50 64 52" opacity="0.9"/>
        <path d="M40 28 C50 38 56 44 63 50" opacity="0.8"/>
        <path d="M88 28 C78 38 72 44 65 50" opacity="0.8"/>
      </g>
    </g>
    <circle cx="64" cy="52" r="13" fill="url(#c1l-core)" filter="url(#c1l-glow)"/>
    <circle cx="64" cy="52" r="5.4" fill="#F2FEFF"/>
    <g fill="#EAFBFF">
      <circle cx="64" cy="30" r="2.1"/>
      <circle cx="42" cy="50" r="1.9" opacity="0.9"/>
      <circle cx="86" cy="50" r="1.9" opacity="0.9"/>
    </g>
  </g>

  <!-- WORDMARK (Orbitron via @font-face/text; vector-path version is concept1_lockup_paths.svg) -->
  <g filter="url(#c1l-textglow)">
    <text x="112" y="56" font-family="Orbitron, 'Eurostile', 'Arial Narrow', sans-serif"
          font-size="34" font-weight="700" letter-spacing="3"
          fill="url(#c1l-word)">NEON</text>
    <text x="112" y="92" font-family="Orbitron, 'Eurostile', 'Arial Narrow', sans-serif"
          font-size="34" font-weight="700" letter-spacing="6.5"
          fill="#94A3B8">FIBER</text>
  </g>
</svg>
